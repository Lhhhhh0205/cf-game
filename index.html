<!DOCTYPE html>
<html lang="zh-CN"> 
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星空射击小游戏</title>  
  <style>
    /* ==================== CSS：页面样式区域开始 ==================== */
    /* 全局颜色变量，后面可以反复复用，改主题时也更方便 */
    :root {
      --text: #edf6ff;
      --muted: #9fb6d6;
      --panel: rgba(7, 16, 31, 0.72);
      --line: rgba(143, 198, 255, 0.18);
      --accent: #ffd166;
      --accent-2: #ff8c42;
      --blue: #66d9ff;
      --pink: #ff6f91;
      --danger: #ff526f;
    }

    /* 让所有元素的宽高计算方式更直观 */
    * {
      box-sizing: border-box;
    }

    /* 整个页面的背景和整体居中布局 */
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(98, 154, 255, 0.2), transparent 24%),
        radial-gradient(circle at 80% 0%, rgba(255, 130, 92, 0.14), transparent 28%),
        linear-gradient(180deg, #02050b 0%, #08111e 48%, #132745 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    /* 游戏外层面板 */
    .app {
      width: min(960px, 100%);
      padding: 20px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(12px);
    }

    /* 顶部区域：左边标题说明，右边分数面板 */
    .top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
      align-items: flex-start;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 4vw, 46px);
      letter-spacing: 0.02em;
    }

    .intro {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
      max-width: 560px;
    }

    /* HUD 是游戏里固定显示信息的区域，这里放分数和生命 */
    .hud {
      min-width: 220px;
      padding: 14px 16px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
    }

    .hud-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 10px;
      font-size: 15px;
    }

    .hud-row:last-child {
      margin-bottom: 0;
    }

    .label {
      color: var(--muted);
    }

    .value {
      font-weight: 700;
    }

    .stage {
      position: relative;
    }

    /* canvas 是真正绘制游戏画面的地方 */
    canvas {
      display: block;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      border-radius: 24px;
      border: 1px solid rgba(154, 211, 255, 0.14);
      background:
        radial-gradient(circle at 50% 18%, rgba(89, 150, 255, 0.14), transparent 28%),
        linear-gradient(180deg, #030812 0%, #071120 55%, #0b1830 100%);
    }

    /* overlay 是开始前和结束后覆盖在游戏上面的提示层 */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 14px;
      padding: 20px;
      text-align: center;
      background: rgba(2, 7, 15, 0.68);
      border-radius: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay h2 {
      margin: 0;
      font-size: clamp(30px, 4vw, 48px);
    }

    .overlay p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 520px;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* 所有按钮的统一样式 */
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      color: #08111d;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      cursor: pointer;
      box-shadow: 0 10px 26px rgba(255, 153, 71, 0.22);
    }

    .ghost {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .tips {
      margin: 16px 0 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      font-size: 14px;
    }

    /* 这是手机适配，小屏幕时改成更适合竖屏的布局 */
    @media (max-width: 720px) {
      body {
        padding: 14px;
      }

      .app {
        padding: 14px;
        border-radius: 20px;
      }

      .top {
        flex-direction: column;
      }

      .hud {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- ==================== HTML：页面内容区域开始 ==================== -->
  <main class="app">
    <section class="top">
      <div>
        <h1>星空射击小游戏</h1>
        <p class="intro">驾驶飞船守住星空防线。左右移动，发射子弹击落敌机。命中后会出现爆炸火花，漏掉敌人会损失生命。</p>
      </div>

      <!-- 右上角信息区：显示游戏实时状态 -->
      <div class="hud">
        <div class="hud-row">
          <span class="label">分数</span>
          <span id="scoreValue" class="value">0</span>
        </div>
        <div class="hud-row">
          <span class="label">生命</span>
          <span id="livesValue" class="value">3</span>
        </div>
        <div class="hud-row">
          <span class="label">状态</span>
          <span id="stateValue" class="value">准备开始</span>
        </div>
      </div>
    </section>

    <section class="stage">
      <!-- 画布：飞船、敌机、子弹、爆炸都画在这里 -->
      <canvas id="gameCanvas" width="900" height="560"></canvas>

      <!-- 开始前和结束后显示的提示层 -->
      <div id="overlay" class="overlay show">
        <h2 id="overlayTitle">准备出发</h2>
        <p id="overlayText">点击开始进入战斗。电脑用左右方向键和空格，手机可用下面的按钮操作。</p>
        <div class="actions">
          <button id="startButton" type="button">开始游戏</button>
          <button id="restartButton" class="ghost" type="button">重新开始</button>
        </div>
      </div>
    </section>

    <p class="tips">电脑操作：方向键左右移动，空格发射。手机操作：按住左右按钮移动，点击发射按钮开火。</p>

    <!-- 手机上也能操作，所以保留了按钮控制 -->
    <div class="actions">
      <button id="leftButton" class="ghost" type="button">向左</button>
      <button id="fireButton" type="button">发射</button>
      <button id="rightButton" class="ghost" type="button">向右</button>
    </div>
  </main>

  <script>
    // ==================== JavaScript：游戏逻辑区域开始 ====================
    // 拿到画布和 2D 画笔，后面的所有图形都靠 ctx 来画
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // 拿到页面中会动态变化的文字和按钮元素
    const scoreValue = document.getElementById("scoreValue");
    const livesValue = document.getElementById("livesValue");
    const stateValue = document.getElementById("stateValue");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const startButton = document.getElementById("startButton");
    const restartButton = document.getElementById("restartButton");
    const leftButton = document.getElementById("leftButton");
    const rightButton = document.getElementById("rightButton");
    const fireButton = document.getElementById("fireButton");

    // ==================== 第一部分：准备基础数据 ====================
    // 预先生成一批星星，循环时只更新它们的位置，形成背景流动效果
    const stars = Array.from({ length: 90 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2.3 + 0.4,
      speed: Math.random() * 0.8 + 0.25,
      alpha: Math.random() * 0.55 + 0.3
    }));

    // 记录左右按键是否正在被按住
    const keys = {
      left: false,
      right: false
    };

    // 玩家飞船的数据：位置、大小、移动速度
    const player = {
      x: canvas.width / 2 - 34,
      y: canvas.height - 84,
      width: 68,
      height: 42,
      speed: 6.5
    };

    // bullets：所有子弹
    // enemies：所有敌机
    // particles：爆炸粒子
    // score：分数
    // lives：生命
    // running：游戏是否正在进行
    // spawnTimer：多久生成一架新敌机
    // fireCooldown：发射冷却，防止无限连发
    let bullets = [];
    let enemies = [];
    let particles = [];
    let score = 0;
    let lives = 3;
    let running = false;
    let spawnTimer = 0;
    let fireCooldown = 0;

    // ==================== 第二部分：界面显示函数 ====================
    // 更新右上角分数、生命和状态文字
    function updateHud(state) {
      scoreValue.textContent = String(score);
      livesValue.textContent = String(lives);
      stateValue.textContent = state;
    }

    // 显示遮罩层，常用于游戏开始前和结束后
    function showOverlay(title, text) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      overlay.classList.add("show");
    }

    // 隐藏遮罩层，进入实际游戏画面
    function hideOverlay() {
      overlay.classList.remove("show");
    }

    // ==================== 第三部分：创建游戏对象 ====================
    // 在某个位置生成一团爆炸粒子
    function createExplosion(x, y, color) {
      for (let i = 0; i < 18; i += 1) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3.8 + 1.2;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          radius: Math.random() * 4 + 2,
          life: 28 + Math.floor(Math.random() * 12),
          color
        });
      }
    }

    // 从画布顶部随机生成一架敌机
    function spawnEnemy() {
      enemies.push({
        x: Math.random() * (canvas.width - 48),
        y: -50,
        width: 48,
        height: 30,
        speed: Math.random() * 1.6 + 1.7,
        sway: Math.random() * Math.PI * 2
      });
    }

    // 发射一颗子弹，子弹会从飞船中间向上飞
    function fireBullet() {
      if (!running || fireCooldown > 0) {
        return;
      }

      bullets.push({
        x: player.x + player.width / 2 - 3,
        y: player.y - 12,
        width: 6,
        height: 18,
        speed: 10
      });

      fireCooldown = 10;
    }

    // ==================== 第四部分：开始、重置、结束 ====================
    // 把整个游戏状态恢复到初始状态，但不直接开始
    function resetState() {
      player.x = canvas.width / 2 - player.width / 2;
      bullets = [];
      enemies = [];
      particles = [];
      score = 0;
      lives = 3;
      running = false;
      spawnTimer = 0;
      fireCooldown = 0;
      updateHud("准备开始");
      showOverlay("准备出发", "点击开始进入战斗。电脑用左右方向键和空格，手机可用下面的按钮操作。");
    }

    // 正式开始一局游戏
    function startGame() {
      player.x = canvas.width / 2 - player.width / 2;
      bullets = [];
      enemies = [];
      particles = [];
      score = 0;
      lives = 3;
      running = true;
      spawnTimer = 0;
      fireCooldown = 0;
      updateHud("战斗中");
      hideOverlay();
    }

    // 游戏结束时显示结果
    function endGame() {
      running = false;
      updateHud("已结束");
      showOverlay("游戏结束", "最终分数：" + score + "。点击重新开始继续挑战。");
    }

    // ==================== 第五部分：每一帧更新游戏数据 ====================
    // 根据按键状态更新玩家位置，并限制不能飞出屏幕
    function updatePlayer() {
      if (keys.left) {
        player.x -= player.speed;
      }

      if (keys.right) {
        player.x += player.speed;
      }

      if (player.x < 16) {
        player.x = 16;
      }

      if (player.x + player.width > canvas.width - 16) {
        player.x = canvas.width - 16 - player.width;
      }
    }

    // 更新所有子弹的位置，飞出屏幕的子弹会被删除
    function updateBullets() {
      bullets = bullets.filter((bullet) => {
        bullet.y -= bullet.speed;
        return bullet.y + bullet.height > 0;
      });
    }

    // 更新敌机位置，敌机漏到底部会扣生命
    function updateEnemies() {
      enemies = enemies.filter((enemy) => {
        enemy.y += enemy.speed;
        enemy.x += Math.sin(enemy.y * 0.03 + enemy.sway) * 0.8;

        if (enemy.y > canvas.height + 10) {
          lives -= 1;
          createExplosion(enemy.x + enemy.width / 2, canvas.height - 24, "#ff8c42");
          return false;
        }

        return true;
      });
    }

    // 更新所有爆炸粒子的运动、大小和寿命
    function updateParticles() {
      particles = particles.filter((particle) => {
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.vx *= 0.98;
        particle.vy *= 0.98;
        particle.radius *= 0.97;
        particle.life -= 1;
        return particle.life > 0 && particle.radius > 0.3;
      });
    }

    // ==================== 第六部分：碰撞检测 ====================
    // 最基础的矩形碰撞检测：两个物体碰到了就返回 true
    function isColliding(a, b) {
      return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
      );
    }

    // 检查子弹有没有打中敌机，打中就加分并触发爆炸
    function checkHits() {
      const nextBullets = [];
      const hitEnemyIndexes = new Set();

      bullets.forEach((bullet) => {
        let hit = false;

        enemies.forEach((enemy, index) => {
          if (!hit && !hitEnemyIndexes.has(index) && isColliding(bullet, enemy)) {
            hit = true;
            hitEnemyIndexes.add(index);
            score += 1;
            createExplosion(
              enemy.x + enemy.width / 2,
              enemy.y + enemy.height / 2,
              score % 2 === 0 ? "#ffd166" : "#ff6f91"
            );
          }
        });

        if (!hit) {
          nextBullets.push(bullet);
        }
      });

      bullets = nextBullets;
      enemies = enemies.filter((_, index) => !hitEnemyIndexes.has(index));
    }

    // 检查敌机有没有撞到玩家，撞到就直接结束
    function checkPlayerCollision() {
      const hitEnemy = enemies.find((enemy) => isColliding(enemy, player));

      if (hitEnemy) {
        createExplosion(player.x + player.width / 2, player.y + player.height / 2, "#66d9ff");
        createExplosion(hitEnemy.x + hitEnemy.width / 2, hitEnemy.y + hitEnemy.height / 2, "#ff526f");
        lives = 0;
      }
    }

    // 每一帧的逻辑更新中心
    // 这里负责移动、碰撞、生成敌人、扣生命和结束判断
    function updateGame() {
      if (running) {
        updatePlayer();
        updateBullets();
        updateEnemies();
        checkHits();
        checkPlayerCollision();

        if (fireCooldown > 0) {
          fireCooldown -= 1;
        }

        spawnTimer += 1;

        if (spawnTimer >= 34) {
          spawnEnemy();
          spawnTimer = 0;
        }

        if (lives <= 0) {
          endGame();
        } else {
          updateHud("战斗中");
        }
      }

      updateParticles();
    }

    // ==================== 第七部分：绘制画面 ====================
    // 绘制不断下落的星星背景
    function drawStars() {
      stars.forEach((star) => {
        star.y += star.speed;

        if (star.y > canvas.height) {
          star.y = -4;
          star.x = Math.random() * canvas.width;
        }

        ctx.fillStyle = "rgba(255, 255, 255, " + star.alpha + ")";
        ctx.fillRect(star.x, star.y, star.size, star.size);
      });
    }

    // 绘制两团朦胧的星云，让画面不那么单调
    function drawNebula() {
      const glowA = ctx.createRadialGradient(150, 120, 10, 150, 120, 180);
      glowA.addColorStop(0, "rgba(85, 147, 255, 0.16)");
      glowA.addColorStop(1, "rgba(85, 147, 255, 0)");
      ctx.fillStyle = glowA;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const glowB = ctx.createRadialGradient(760, 180, 20, 760, 180, 220);
      glowB.addColorStop(0, "rgba(255, 120, 100, 0.12)");
      glowB.addColorStop(1, "rgba(255, 120, 100, 0)");
      ctx.fillStyle = glowB;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // 绘制玩家飞船
    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);

      ctx.fillStyle = "#4fc3f7";
      ctx.beginPath();
      ctx.moveTo(player.width / 2, 0);
      ctx.lineTo(player.width, player.height);
      ctx.lineTo(player.width * 0.72, player.height * 0.82);
      ctx.lineTo(player.width * 0.58, player.height);
      ctx.lineTo(player.width * 0.42, player.height);
      ctx.lineTo(player.width * 0.28, player.height * 0.82);
      ctx.lineTo(0, player.height);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#d9f6ff";
      ctx.beginPath();
      ctx.moveTo(player.width / 2, 10);
      ctx.lineTo(player.width * 0.64, player.height * 0.72);
      ctx.lineTo(player.width * 0.36, player.height * 0.72);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "rgba(255, 174, 66, 0.85)";
      ctx.fillRect(player.width * 0.22, player.height - 2, 8, 12);
      ctx.fillRect(player.width * 0.7, player.height - 2, 8, 12);
      ctx.restore();
    }

    // 绘制所有子弹，并给子弹加一点发光效果
    function drawBullets() {
      bullets.forEach((bullet) => {
        const gradient = ctx.createLinearGradient(bullet.x, bullet.y, bullet.x, bullet.y + bullet.height);
        gradient.addColorStop(0, "#fff9c4");
        gradient.addColorStop(1, "#ffb703");
        ctx.fillStyle = gradient;
        ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);

        ctx.fillStyle = "rgba(255, 235, 153, 0.22)";
        ctx.fillRect(bullet.x - 4, bullet.y, bullet.width + 8, bullet.height + 6);
      });
    }

    // 绘制所有敌机
    function drawEnemies() {
      enemies.forEach((enemy) => {
        ctx.save();
        ctx.translate(enemy.x, enemy.y);

        ctx.fillStyle = "#ff637d";
        ctx.beginPath();
        ctx.moveTo(enemy.width / 2, 0);
        ctx.lineTo(enemy.width, enemy.height * 0.42);
        ctx.lineTo(enemy.width * 0.82, enemy.height);
        ctx.lineTo(enemy.width * 0.18, enemy.height);
        ctx.lineTo(0, enemy.height * 0.42);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#ffd4df";
        ctx.fillRect(10, 10, 8, 8);
        ctx.fillRect(enemy.width - 18, 10, 8, 8);
        ctx.fillStyle = "#8c1731";
        ctx.fillRect(enemy.width / 2 - 5, enemy.height * 0.44, 10, 8);
        ctx.restore();
      });
    }

    // 绘制爆炸粒子
    function drawParticles() {
      particles.forEach((particle) => {
        ctx.beginPath();
        ctx.fillStyle = particle.color;
        ctx.globalAlpha = Math.max(0, particle.life / 40);
        ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      });
    }

    // 按顺序重画整帧画面
    function drawFrame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawNebula();
      drawStars();
      drawBullets();
      drawEnemies();
      drawPlayer();
      drawParticles();
    }

    // ==================== 第八部分：主循环和操作控制 ====================
    // 游戏主循环：先更新数据，再重画画面，然后进入下一帧
    function loop() {
      updateGame();
      drawFrame();
      requestAnimationFrame(loop);
    }

    // 给手机按钮加上“按住持续移动”的能力
    function bindHoldButton(button, direction) {
      button.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        keys[direction] = true;
      });

      button.addEventListener("pointerup", () => {
        keys[direction] = false;
      });

      button.addEventListener("pointerleave", () => {
        keys[direction] = false;
      });

      button.addEventListener("pointercancel", () => {
        keys[direction] = false;
      });
    }

    // 电脑键盘控制：按下左右键移动，按空格发射
    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") {
        keys.left = true;
      }

      if (event.key === "ArrowRight") {
        keys.right = true;
      }

      if (event.key === " " || event.code === "Space") {
        event.preventDefault();
        fireBullet();
      }
    });

    // 松开按键后停止移动
    document.addEventListener("keyup", (event) => {
      if (event.key === "ArrowLeft") {
        keys.left = false;
      }

      if (event.key === "ArrowRight") {
        keys.right = false;
      }
    });

    // 按钮点击事件
    startButton.addEventListener("click", startGame);
    restartButton.addEventListener("click", startGame);
    fireButton.addEventListener("click", fireBullet);

    bindHoldButton(leftButton, "left");
    bindHoldButton(rightButton, "right");

    // 页面打开时，先显示初始状态，再启动动画循环
    resetState();
    loop();
  </script>
</body>
</html>
