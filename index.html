  <!DOCTYPE html>
  <html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>射击小游戏</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #dcdcdc;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .box {
        text-align: center;
      }

      h1 {
        color: #222;
        margin-bottom: 10px;
      }

      #score {
        margin-bottom: 10px;
        font-size: 20px;
        color: #333;
      }

      canvas {
        background: white;
        border: 2px solid #333;
        display: block;
        margin: 0 auto;
      }

      #restartButton {
        margin-top: 15px;
        padding: 10px 18px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: orange;
        color: white;
        cursor: pointer;
        display: none;
      }

      #restartButton:hover {
        background: darkorange;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>我的射击小游戏</h1>
      <div id="score">分数：0</div>
      <canvas id="gameCanvas" width="600" height="400"></canvas>
      <button id="restartButton" onclick="restartGame()">重新开始</button>
    </div>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const scoreText = document.getElementById("score");
      const restartButton = document.getElementById("restartButton");

      let score = 0;
      let gameOver = false;

      let playerX = 250;
      const playerY = 330;
      const playerWidth = 100;
      const playerHeight = 40;
      const playerSpeed = 20;

      let bulletX = 0;
      let bulletY = 0;
      let bulletActive = false;

      let enemyX = 200;
      let enemyY = 50;
      const enemyWidth = 80;
      const enemyHeight = 40;
      let enemySpeed = 3;

      function drawPlayer() {
        ctx.fillStyle = "blue";
        ctx.fillRect(playerX, playerY, playerWidth, playerHeight);
      }

      function drawBullet() {
        if (bulletActive) {
          ctx.fillStyle = "red";
          ctx.fillRect(bulletX, bulletY, 10, 20);
        }
      }

      function drawEnemy() {
        ctx.fillStyle = "green";
        ctx.fillRect(enemyX, enemyY, enemyWidth, enemyHeight);
      }

      function drawGameOver() {
        ctx.fillStyle = "black";
        ctx.font = "40px Arial";
        ctx.fillText("游戏结束", 220, 200);
      }

      function updateBullet() {
        if (bulletActive) {
          bulletY -= 10;

          if (bulletY < 0) {
            bulletActive = false;
          }
        }
      }

      function updateEnemy() {
        enemyX += enemySpeed;

        if (enemyX <= 0 || enemyX + enemyWidth >= canvas.width) {
          enemySpeed = -enemySpeed;
          enemyY += 20;
        }
      }

      function checkHit() {
        if (
          bulletActive &&
          bulletX < enemyX + enemyWidth &&
          bulletX + 10 > enemyX &&
          bulletY < enemyY + enemyHeight &&
          bulletY + 20 > enemyY
        ) {
          bulletActive = false;
          enemyX = Math.random() * (canvas.width - enemyWidth);
          enemyY = 50;
          score++;
          scoreText.innerText = "分数：" + score;
        }
      }

      function checkGameOver() {
        if (
          enemyX < playerX + playerWidth &&
          enemyX + enemyWidth > playerX &&
          enemyY < playerY + playerHeight &&
          enemyY + enemyHeight > playerY
        ) {
          gameOver = true;
          restartButton.style.display = "inline-block";
        }
      }

      function restartGame() {
        score = 0;
        gameOver = false;

        playerX = 250;

        bulletX = 0;
        bulletY = 0;
        bulletActive = false;

        enemyX = 200;
        enemyY = 50;
        enemySpeed = 3;

        scoreText.innerText = "分数：0";
        restartButton.style.display = "none";
      }

      function drawGame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawPlayer();
        drawBullet();
        drawEnemy();

        if (gameOver) {
          drawGameOver();
        }
      }

 document.addEventListener("keydown", function(event) {
    if (gameOver) {
      return;
    }

    if (event.key === "ArrowLeft") {
      playerX -= playerSpeed;

      if (playerX < 0) {
        playerX = 0;
      }
    }

    if (event.key === "ArrowRight") {
      playerX += playerSpeed;

      if (playerX + playerWidth > canvas.width) {
        playerX = canvas.width - playerWidth;
      }
    }

    if (event.key === " " && bulletActive === false) {
      bulletX = playerX + playerWidth / 2 - 5;
      bulletY = playerY;
      bulletActive = true;
    }
  });

      function gameLoop() {
        if (!gameOver) {
          updateBullet();
          updateEnemy();
          checkHit();
          checkGameOver();
        }

        drawGame();
        requestAnimationFrame(gameLoop);
      }

      gameLoop();
    </script>
  </body>
  </html>
